name: DevOps Command Explorer Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Native Systemd Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Backend Dependencies
        run: |
          cd backend
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt

      - name: Copy Updated Files to Deployment Directories
        run: |
          # Ensure deployment directories exist
          sudo mkdir -p /home/ec2-user/devops-command-explorer/frontend
          sudo mkdir -p /home/ec2-user/devops-command-explorer/backend

          # Copy frontend production build and node static server
          sudo cp -R frontend/dist /home/ec2-user/devops-command-explorer/frontend/
          sudo cp frontend/server.js /home/ec2-user/devops-command-explorer/frontend/

          # Copy backend source code and dependencies
          sudo cp -R backend/app /home/ec2-user/devops-command-explorer/backend/
          sudo cp -R backend/venv /home/ec2-user/devops-command-explorer/backend/
          sudo cp backend/requirements.txt /home/ec2-user/devops-command-explorer/backend/

          # Update directory permissions
          sudo chown -R ec2-user:ec2-user /home/ec2-user/devops-command-explorer

      - name: Configure Systemd Service Files
        run: |
          sudo cp backend/systemd/backend.service /etc/systemd/system/backend.service
          sudo cp frontend/systemd/frontend.service /etc/systemd/system/frontend.service
          sudo systemctl daemon-reload
          sudo systemctl enable backend.service
          sudo systemctl enable frontend.service

      - name: Restart Backend Service
        run: |
          sudo systemctl restart backend.service

      - name: Restart Frontend Service
        run: |
          sudo systemctl restart frontend.service

      - name: Verify Both Services Are Running
        run: |
          # Check active status of systemd services
          sudo systemctl is-active --quiet backend.service
          echo "FastAPI backend.service is active and running."
          sudo systemctl is-active --quiet frontend.service
          echo "React frontend.service is active and running."
